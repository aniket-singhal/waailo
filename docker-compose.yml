# Full local stack for Waailo HR: PostgreSQL + Redis + backend API + frontend.
# `docker compose up --build` runs everything; or run only the datastores and
# start backend/frontend on the host with their own `npm run dev`.
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: waailo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: waailo
      POSTGRES_PASSWORD: waailo
      POSTGRES_DB: waailo
    ports:
      - '5432:5432'
    volumes:
      - waailo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U waailo']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: waailo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - waailo_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: waailo-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3001'
      API_PREFIX: api/v1
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://waailo:waailo@postgres:5432/waailo?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      STORAGE_DRIVER: local
    ports:
      - '3001:3001'
    # Apply migrations, then start the API. Seed once via:
    #   docker compose exec backend npx prisma db seed   (after `npm i` locally) or
    #   run `npm run seed` on the host against the same DATABASE_URL.
    command: sh -c "npx prisma migrate deploy; node dist/main.js"

  frontend:
    build: ./frontend
    container_name: waailo-frontend
    depends_on:
      - backend
    environment:
      # Browser talks to the API on localhost (host port mapping).
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'

volumes:
  waailo_pg:
  waailo_redis:
